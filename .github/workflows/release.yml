name: Release

# Push a version tag (e.g. v0.0.3) to build and publish the portable Windows exe.
# Installed copies self-update from this repo's latest release (no installer, no signing key).
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # `tauri build` runs the frontend build and embeds it into the exe (prod mode).
      # --no-bundle skips the NSIS/MSI installers; we only ship the portable exe.
      - run: npx tauri build --no-bundle

      # Publish the portable exe under the stable name the in-app updater looks for.
      - run: cp src-tauri/target/release/twui-editor.exe TWUI-Editor-x64.exe

      - uses: softprops/action-gh-release@v2
        with:
          name: "TWUI Editor ${{ github.ref_name }}"
          body: "Portable build — download TWUI-Editor-x64.exe and run it. Installed copies auto-update from here."
          files: TWUI-Editor-x64.exe
